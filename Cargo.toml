[package]
name = "sdk"
version = "0.1.0"
edition = "2024"

[dependencies]
base64 = "0.22.1"
chrono = { version = "0.4.43", features = ["serde"] }
futures = "0.3.32"
hmac = "0.12.1"
home = "0.5.12"
log = "0.4"
reqwest = { version = "0.13.1", features = ["json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_urlencoded = "0.7.1"
sha2 = "0.10.9"
tower = { version = "0.5.3", features = ["buffer"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "tracing"] }
env_logger = "*"
