name: osc-sdk-rust crate.io publishing

on:
  release:
    types: [released]

permissions:
  contents: read
  id-token: write 

jobs:
  publish:
    environment: publish
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1 (branch)
      id: auth
    - name: Cargo publish
      run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
